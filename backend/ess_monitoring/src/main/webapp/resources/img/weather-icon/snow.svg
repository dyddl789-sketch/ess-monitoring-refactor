<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e2e8f0"></stop>
      <stop offset="100%" stop-color="#94a3b8"></stop>
    </linearGradient>

    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.35"></feDropShadow>
    </filter>
  </defs>

  <!-- 구름 -->
  <g filter="url(#shadow)">
    <circle cx="45" cy="52" r="18" fill="url(#cloudGrad)"></circle>
    <circle cx="66" cy="45" r="24" fill="url(#cloudGrad)"></circle>
    <circle cx="88" cy="55" r="18" fill="url(#cloudGrad)"></circle>

    <rect x="32" y="54" width="72" height="24" rx="12" fill="url(#cloudGrad)"></rect>
  </g>

  <!-- 눈송이 -->
  <g stroke="#f8fafc" stroke-width="3" stroke-linecap="round">

    <!-- 첫 번째 -->
    <g transform="translate(45 92)">
      <line x1="-8" y1="0" x2="8" y2="0"></line>
      <line x1="0" y1="-8" x2="0" y2="8"></line>
      <line x1="-6" y1="-6" x2="6" y2="6"></line>
      <line x1="-6" y1="6" x2="6" y2="-6"></line>
    </g>

    <!-- 두 번째 -->
    <g transform="translate(70 100)">
      <line x1="-8" y1="0" x2="8" y2="0"></line>
      <line x1="0" y1="-8" x2="0" y2="8"></line>
      <line x1="-6" y1="-6" x2="6" y2="6"></line>
      <line x1="-6" y1="6" x2="6" y2="-6"></line>
    </g>

    <!-- 세 번째 -->
    <g transform="translate(92 90)">
      <line x1="-8" y1="0" x2="8" y2="0"></line>
      <line x1="0" y1="-8" x2="0" y2="8"></line>
      <line x1="-6" y1="-6" x2="6" y2="6"></line>
      <line x1="-6" y1="6" x2="6" y2="-6"></line>
    </g>
  </g>
</svg>